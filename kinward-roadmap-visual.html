<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinward Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', Georgia, serif; background: #FAF6F1; color: #2C2C2C; padding: 40px 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 600; margin: 12px 0 4px; }
  .header .sub { color: #6B6B6B; font-size: 14px; font-family: 'DM Mono', monospace; }
  .progress-bar { width: 100%; max-width: 400px; height: 8px; background: #E8E4DF; border-radius: 4px; margin: 16px auto 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4A8C5C, #D4622B); border-radius: 4px; transition: width 0.6s ease; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 13px; color: #D4622B; margin-top: 8px; font-weight: 500; }
  .timeline { position: relative; }
  .timeline::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: #E8E4DF; }
  .phase { margin-bottom: 8px; position: relative; }
  .node { position: absolute; left: 8px; top: 16px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .node.done { background: #4A8C5C; border: 3px solid #4A8C5C; }
  .node.current { background: #D4622B; border: 3px solid #D4622B; }
  .node.future { background: #E8E4DF; border: 3px solid #6B6B6B; }
  .card { margin-left: 48px; padding: 16px 20px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
  .card.done { background: #E8F5E8; border: 1px solid #c8e6c8; }
  .card.current { background: #FFF0E8; border: 1px solid #E8956A; box-shadow: 0 2px 12px rgba(44,44,44,0.06); }
  .card.future { background: white; border: 1px solid #E8E4DF; }
  .phase-label { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
  .phase-label.done { color: #4A8C5C; }
  .phase-label.current { color: #D4622B; }
  .phase-label.future { color: #6B6B6B; }
  .phase-title { font-size: 18px; font-weight: 600; margin: 4px 0 0; }
  .card-header { display: flex; justify-content: space-between; align-items: center; }
  .count { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .count.done { color: #4A8C5C; }
  .count.other { color: #6B6B6B; }
  .mini-bar { width: 100%; height: 4px; border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .mini-bar.done { background: #c8e6c8; }
  .mini-bar.other { background: #E8E4DF; }
  .mini-fill-green { height: 100%; background: #4A8C5C; border-radius: 2px; }
  .mini-fill-orange { height: 100%; background: #D4622B; border-radius: 2px; }
  .items { margin-top: 16px; display: none; }
  .items.open { display: block; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
  .item + .item { border-top: 1px solid #E8E4DF; }
  .item .icon { font-size: 16px; line-height: 22px; flex-shrink: 0; }
  .item .text { font-size: 14px; }
  .item .text.struck { color: #6B6B6B; text-decoration: line-through; opacity: 0.7; }
  .chevron { transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .footer { text-align: center; margin-top: 40px; padding: 20px 0; border-top: 1px solid #E8E4DF; color: #6B6B6B; font-size: 13px; font-family: 'DM Mono', monospace; }
  .shield { display: inline-block; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <svg class="shield" width="48" height="48" viewBox="0 0 24 28" fill="none">
      <path d="M12 1L2 5.5V12.5C2 19.5 6.5 25.5 12 27C17.5 25.5 22 19.5 22 12.5V5.5L12 1Z" stroke="#D4622B" stroke-width="2" fill="none"/>
      <circle cx="12" cy="13" r="2" fill="#D4622B"/>
    </svg>
    <h1>Kinward Roadmap</h1>
    <p class="sub" id="counter"></p>
    <div class="progress-bar"><div class="progress-fill" id="mainBar"></div></div>
    <p class="progress-text" id="pctText"></p>
  </div>
  <div class="timeline" id="timeline"></div>
  <div class="footer">Last updated: March 16, 2026 — Session #6</div>
</div>
<script>
const phases = [
  { id:"phase0", label:"Phase 0", title:"Foundation", state:"done", items:[
    {t:"Model category mapping (4 categories)",d:true},
    {t:"World context (knowledge freshness)",d:true},
    {t:"LAN IP detection (VPN filtering)",d:true},
    {t:"PWA manifest & service worker",d:true},
    {t:"Landing page live at kinward.ai",d:true},
  ]},
  { id:"phase1", label:"Phase 1", title:"Core Experience", state:"done", items:[
    {t:"AI identity system (dynamic naming)",d:true},
    {t:"Clean shield branding throughout UI",d:true},
    {t:"Settings panel (Identity, Memory, World Context, Profiles)",d:true},
    {t:"Core memory — persistent per-profile facts",d:true},
    {t:"Auto-extraction — learns facts from conversations",d:true},
    {t:"Category normalization for memory",d:true},
    {t:"Memory API — CRUD + export/import backups",d:true},
  ]},
  { id:"docdrop", label:"Document Drop", title:"The Big Build", state:"done", items:[
    {t:"Step 1: Backend upload pipeline (multer, pdf-parse, chunking)",d:true},
    {t:"Step 2: Chat injection (4K token budget, honest truncation)",d:true},
    {t:"Step 3: Frontend upload UI (📎 button, drag-drop, attachment card)",d:true},
    {t:"Step 4: Image OCR (llama3.2-vision, auto-pull)",d:true},
    {t:"Step 5: Document memory (auto-extract facts from uploads)",d:true},
  ]},
  { id:"testing", label:"Up Next", title:"Testing & Polish", state:"current", items:[
    {t:"Multi-fact extraction live test",d:false},
    {t:"AI identity rename end-to-end test",d:false},
    {t:"Full timed run (target: under 5 min)",d:false},
    {t:"Reduce debug logging (DEBUG env var)",d:false},
    {t:"Component file splitting (KinwardChat.jsx)",d:false},
    {t:"Consolidate shared utils (api helper, brand tokens)",d:false},
    {t:"r/LocalLLaMA post with screenshots",d:false},
  ]},
  { id:"phase2", label:"Phase 2", title:"Depth & Intelligence", state:"future", items:[
    {t:"Session memory (Tier 2) — auto conversation summaries",d:false},
    {t:"SearXNG — self-hosted search for knowledge freshness",d:false},
    {t:"Tailscale — remote access from anywhere",d:false},
    {t:"Recipe SDK specification (YAML, sandboxing)",d:false},
    {t:"Passphrase encryption (upgrade from PINs)",d:false},
    {t:"Dashboard wireframes (admin usage views)",d:false},
  ]},
  { id:"phase3", label:"Phase 3", title:"Expansion", state:"future", items:[
    {t:"BitNet integration (CPU-only mode)",d:false},
    {t:"Lightweight RAG (full retrieval pipeline)",d:false},
    {t:"RSS feed indexing for knowledge freshness",d:false},
    {t:"Marketplace content governance",d:false},
    {t:"Funding model ($10 license + marketplace)",d:false},
  ]},
  { id:"phase4", label:"Phase 4", title:"Scale", state:"future", items:[
    {t:"Recipe marketplace launch",d:false},
    {t:"One-click installer (Windows/Mac)",d:false},
    {t:"Bluetooth-to-WiFi pairing for mobile setup",d:false},
    {t:"Multi-node household support",d:false},
  ]},
];

const total = phases.reduce((s,p) => s + p.items.length, 0);
const done = phases.reduce((s,p) => s + p.items.filter(i => i.d).length, 0);
const pct = Math.round((done/total)*100);

document.getElementById("counter").textContent = `${done} of ${total} milestones complete`;
document.getElementById("mainBar").style.width = pct + "%";
document.getElementById("pctText").textContent = pct + "% complete";

const tl = document.getElementById("timeline");
phases.forEach((phase) => {
  const doneCount = phase.items.filter(i => i.d).length;
  const donePct = Math.round((doneCount / phase.items.length) * 100);
  const stateLabel = phase.state === "done" ? " — COMPLETE" : phase.state === "current" ? " — IN PROGRESS" : "";

  const div = document.createElement("div");
  div.className = "phase";
  div.innerHTML = `
    <div class="node ${phase.state}">
      ${phase.state === "done" ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="white"><path d="M6.5 12L2 7.5L3.5 6L6.5 9L12.5 3L14 4.5L6.5 12Z"/></svg>' : ""}
      ${phase.state === "current" ? '<div style="width:8px;height:8px;border-radius:50%;background:white"></div>' : ""}
    </div>
    <div class="card ${phase.state}" onclick="togglePhase('${phase.id}')">
      <div class="card-header">
        <div>
          <div class="phase-label ${phase.state}">${phase.label}${stateLabel}</div>
          <div class="phase-title">${phase.title}</div>
        </div>
        <div style="text-align:right">
          <div class="count ${phase.state === 'done' ? 'done' : 'other'}">${doneCount}/${phase.items.length}</div>
          <svg class="chevron" id="chev-${phase.id}" width="16" height="16" viewBox="0 0 16 16">
            <path d="M4 6L8 10L12 6" fill="none" stroke="#6B6B6B" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="mini-bar ${phase.state === 'done' ? 'done' : 'other'}">
        <div class="${phase.state === 'done' ? 'mini-fill-green' : 'mini-fill-orange'}" style="width:${donePct}%"></div>
      </div>
      <div class="items" id="items-${phase.id}">
        ${phase.items.map(item => `
          <div class="item">
            <span class="icon">${item.d ? "✅" : "⬜"}</span>
            <span class="text ${item.d ? "struck" : ""}">${item.t}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;
  tl.appendChild(div);
});

function togglePhase(id) {
  const items = document.getElementById("items-" + id);
  const chev = document.getElementById("chev-" + id);
  items.classList.toggle("open");
  chev.classList.toggle("open");
}
</script>
</body>
</html>
