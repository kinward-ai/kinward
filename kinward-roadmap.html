<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinward Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', Georgia, serif; background: #FAF6F1; color: #2C2C2C; padding: 40px 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 600; margin: 12px 0 4px; }
  .header .sub { color: #6B6B6B; font-size: 14px; font-family: 'DM Mono', monospace; }
  .progress-bar { width: 100%; max-width: 400px; height: 8px; background: #E8E4DF; border-radius: 4px; margin: 16px auto 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4A8C5C, #D4622B); border-radius: 4px; transition: width 0.6s ease; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 13px; color: #D4622B; margin-top: 8px; font-weight: 500; }
  .timeline { position: relative; }
  .timeline::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: #E8E4DF; }
  .phase { margin-bottom: 8px; position: relative; }
  .node { position: absolute; left: 8px; top: 16px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .node.done { background: #4A8C5C; border: 3px solid #4A8C5C; }
  .node.current { background: #D4622B; border: 3px solid #D4622B; }
  .node.future { background: #E8E4DF; border: 3px solid #6B6B6B; }
  .card { margin-left: 48px; padding: 16px 20px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
  .card.done { background: #E8F5E8; border: 1px solid #c8e6c8; }
  .card.current { background: #FFF0E8; border: 1px solid #E8956A; box-shadow: 0 2px 12px rgba(44,44,44,0.06); }
  .card.future { background: white; border: 1px solid #E8E4DF; }
  .phase-label { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
  .phase-label.done { color: #4A8C5C; }
  .phase-label.current { color: #D4622B; }
  .phase-label.future { color: #6B6B6B; }
  .phase-title { font-size: 18px; font-weight: 600; margin: 4px 0 0; }
  .phase-header { display: flex; justify-content: space-between; align-items: center; }
  .phase-count { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .phase-count.done { color: #4A8C5C; }
  .phase-count.other { color: #6B6B6B; }
  .mini-bar { width: 100%; height: 4px; border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .mini-bar.done-bg { background: #c8e6c8; }
  .mini-bar.other-bg { background: #E8E4DF; }
  .mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .mini-fill.green { background: #4A8C5C; }
  .mini-fill.orange { background: #D4622B; }
  .items { margin-top: 16px; display: none; }
  .items.open { display: block; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
  .item + .item { border-top: 1px solid #E8E4DF; }
  .item.in-done + .item.in-done { border-top-color: #d8eed8; }
  .item-icon { font-size: 16px; line-height: 22px; flex-shrink: 0; }
  .item-text { font-size: 14px; }
  .item-text.checked { color: #6B6B6B; text-decoration: line-through; opacity: 0.7; }
  .chevron { transition: transform 0.2s; margin-top: 4px; }
  .chevron.open { transform: rotate(180deg); }
  .footer { text-align: center; margin-top: 40px; padding: 20px 0; border-top: 1px solid #E8E4DF; color: #6B6B6B; font-size: 13px; font-family: 'DM Mono', monospace; }
  .alpha-callout { background: linear-gradient(135deg, #FFF0E8, #FFFDF9); border: 2px solid #D4622B; border-radius: 14px; padding: 24px; margin: 32px 0; text-align: center; }
  .alpha-callout h3 { font-size: 16px; color: #D4622B; font-family: 'DM Mono', monospace; letter-spacing: 2px; margin-bottom: 8px; }
  .alpha-callout p { font-size: 14px; color: #6B6B6B; line-height: 1.6; }
  .alpha-callout .number { font-size: 36px; font-weight: 700; color: #D4622B; font-family: 'DM Mono', monospace; margin: 8px 0; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <svg width="48" height="48" viewBox="0 0 24 28" fill="none"><path d="M12 1L2 5.5V12.5C2 19.5 6.5 25.5 12 27C17.5 25.5 22 19.5 22 12.5V5.5L12 1Z" stroke="#D4622B" stroke-width="2" fill="none"/><circle cx="12" cy="13" r="2" fill="#D4622B"/></svg>
    <h1>Kinward Roadmap</h1>
    <p class="sub" id="milestone-count"></p>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="progress-text" id="progress-text"></p>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="alpha-callout">
    <h3>DISTANCE TO ALPHA</h3>
    <div class="number" id="alpha-remaining"></div>
    <p id="alpha-desc"></p>
  </div>

  <div class="footer">Last updated: March 16, 2026 — Session #7</div>
</div>

<script>
const phases = [
  {
    id: "phase0", label: "Phase 0", title: "Foundation", status: "done",
    items: [
      { text: "Express + SQLite + Vite dev setup", done: true },
      { text: "Model category mapping (4 categories)", done: true },
      { text: "World context (knowledge freshness)", done: true },
      { text: "LAN IP detection (VPN filtering)", done: true },
      { text: "PWA manifest & service worker", done: true },
      { text: "Landing page live at kinward.ai", done: true },
    ],
  },
  {
    id: "phase1", label: "Phase 1", title: "Core Experience", status: "done",
    items: [
      { text: "AI identity system (dynamic naming)", done: true },
      { text: "Clean shield branding throughout UI", done: true },
      { text: "Settings panel (Identity, Memory, World Context, Profiles)", done: true },
      { text: "Core memory — persistent per-profile facts", done: true },
      { text: "Auto-extraction — learns facts from conversations", done: true },
      { text: "Multi-fact extraction (spaghetti squash bug fix)", done: true },
      { text: "Category normalization for memory", done: true },
      { text: "Memory API — CRUD + export/import backups", done: true },
    ],
  },
  {
    id: "docdrop", label: "Document Drop", title: "The Big Build", status: "done",
    items: [
      { text: "Backend upload pipeline (multer, pdf-parse, chunking)", done: true },
      { text: "Chat injection (4K token budget, honest truncation)", done: true },
      { text: "Frontend upload UI (paperclip button, drag-drop, attachment card)", done: true },
      { text: "Image OCR (llama3.2-vision, auto-pull)", done: true },
      { text: "Document memory (auto-extract facts from uploads)", done: true },
    ],
  },
  {
    id: "polish", label: "Testing & Polish", title: "Production Quality", status: "done",
    items: [
      { text: "Multi-fact extraction live test", done: true },
      { text: "AI identity rename end-to-end test", done: true },
      { text: "Fix: dynamic system prompt (stale model_configs bug)", done: true },
      { text: "Fix: service worker cache-first → network-first", done: true },
      { text: "Fix: Express cache headers for sw.js and index.html", done: true },
      { text: "Configurable debug logging (DEBUG env var)", done: true },
      { text: "Component file splitting (KinwardChat → 7 modules)", done: true },
      { text: "Shared utils consolidation (api, BRAND, ShieldIcon)", done: true },
    ],
  },
  {
    id: "alpha", label: "Alpha Release", title: "Ship It", status: "current",
    items: [
      { text: "Full timed run (fresh reset → wizard → chat → doc, target <5 min)", done: false },
      { text: "Error boundary (graceful crash recovery in UI)", done: false },
      { text: "README with install instructions (git clone → npm install → go)", done: false },
      { text: "One-command startup script (start Ollama + server + dev)", done: false },
      { text: "r/LocalLLaMA post with screenshots + demo", done: false },
      { text: "GitHub repo public release", done: false },
    ],
  },
  {
    id: "phase2", label: "Phase 2", title: "Depth & Intelligence", status: "future",
    items: [
      { text: "Session memory (Tier 2) — auto conversation summaries", done: false },
      { text: "SearXNG — self-hosted search for knowledge freshness", done: false },
      { text: "Tailscale — remote access from anywhere", done: false },
      { text: "Recipe SDK specification (YAML, sandboxing)", done: false },
      { text: "Passphrase encryption (upgrade from PINs)", done: false },
      { text: "Dashboard wireframes (admin usage views)", done: false },
    ],
  },
  {
    id: "phase3", label: "Phase 3", title: "Expansion", status: "future",
    items: [
      { text: "BitNet integration (CPU-only mode)", done: false },
      { text: "Lightweight RAG (full retrieval pipeline)", done: false },
      { text: "RSS feed indexing for knowledge freshness", done: false },
      { text: "Marketplace content governance", done: false },
      { text: "Funding model ($10 license + marketplace)", done: false },
    ],
  },
  {
    id: "phase4", label: "Phase 4", title: "Scale", status: "future",
    items: [
      { text: "Recipe marketplace launch", done: false },
      { text: "One-click installer (Windows/Mac)", done: false },
      { text: "Bluetooth-to-WiFi pairing for mobile setup", done: false },
      { text: "Multi-node household support", done: false },
    ],
  },
];

// Calculate stats
const totalItems = phases.reduce((s, p) => s + p.items.length, 0);
const doneItems = phases.reduce((s, p) => s + p.items.filter(i => i.done).length, 0);
const pct = Math.round((doneItems / totalItems) * 100);

document.getElementById("milestone-count").textContent = `${doneItems} of ${totalItems} milestones complete`;
document.getElementById("progress-fill").style.width = `${pct}%`;
document.getElementById("progress-text").textContent = `${pct}% complete`;

// Alpha callout
const alphaPhase = phases.find(p => p.id === "alpha");
const alphaRemaining = alphaPhase.items.filter(i => !i.done).length;
const alphaTotal = alphaPhase.items.length;
document.getElementById("alpha-remaining").textContent = `${alphaRemaining} items`;
document.getElementById("alpha-desc").textContent = alphaRemaining === 0
  ? "Alpha is ready to ship!"
  : `${alphaRemaining} of ${alphaTotal} items remain before the first public alpha. Everything before this phase is complete.`;

// Render timeline
const timeline = document.getElementById("timeline");
phases.forEach((phase) => {
  const donePct = phase.items.length > 0
    ? Math.round((phase.items.filter(i => i.done).length / phase.items.length) * 100) : 0;
  const statusClass = phase.status;

  const phaseDiv = document.createElement("div");
  phaseDiv.className = "phase";
  phaseDiv.innerHTML = `
    <div class="node ${statusClass === "done" ? "done" : statusClass === "current" ? "current" : "future"}">
      ${statusClass === "done" ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="white"><path d="M6.5 12L2 7.5L3.5 6L6.5 9L12.5 3L14 4.5L6.5 12Z"/></svg>' : ""}
      ${statusClass === "current" ? '<div style="width:8px;height:8px;border-radius:50%;background:white"></div>' : ""}
    </div>
    <div class="card ${statusClass === "done" ? "done" : statusClass === "current" ? "current" : "future"}" onclick="togglePhase('${phase.id}')">
      <div class="phase-header">
        <div>
          <div class="phase-label ${statusClass}">
            ${phase.label}${statusClass === "current" ? " — IN PROGRESS" : statusClass === "done" ? " — COMPLETE" : ""}
          </div>
          <div class="phase-title">${phase.title}</div>
        </div>
        <div style="text-align:right">
          <div class="phase-count ${statusClass === "done" ? "done" : "other"}">
            ${phase.items.filter(i => i.done).length}/${phase.items.length}
          </div>
          <svg class="chevron" id="chevron-${phase.id}" width="16" height="16" viewBox="0 0 16 16"><path d="M4 6L8 10L12 6" fill="none" stroke="#6B6B6B" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div class="mini-bar ${statusClass === "done" ? "done-bg" : "other-bg"}">
        <div class="mini-fill ${statusClass === "done" ? "green" : "orange"}" style="width:${donePct}%"></div>
      </div>
      <div class="items" id="items-${phase.id}">
        ${phase.items.map(item => `
          <div class="item ${statusClass === "done" ? "in-done" : ""}">
            <span class="item-icon">${item.done ? "\u2705" : "\u2B1C"}</span>
            <span class="item-text ${item.done ? "checked" : ""}">${item.text}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;
  timeline.appendChild(phaseDiv);
});

function togglePhase(id) {
  const items = document.getElementById("items-" + id);
  const chevron = document.getElementById("chevron-" + id);
  items.classList.toggle("open");
  chevron.classList.toggle("open");
}

// Auto-expand current phase
const currentPhase = phases.find(p => p.status === "current");
if (currentPhase) {
  document.getElementById("items-" + currentPhase.id).classList.add("open");
  document.getElementById("chevron-" + currentPhase.id).classList.add("open");
}
</script>
</body>
</html>
